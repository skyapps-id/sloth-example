apiVersion: 1

groups:
  - orgId: 1
    name: slo-alerts
    folder: SLO Alerts
    interval: 60s
    rules:
      - uid: slo-tier1-breach
        title: "[Tier1] SLO Breach"
        condition: C
        for: 2m
        labels:
          severity: critical
          tier: critical
        annotations:
          summary: "Tier1 SLO Compliance breach (target: 99.9%)"
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: PBFA97CFB590B2093
              editorMode: code
              expr: '1 - slo:sli_error:ratio_rate5m{sloth_slo=~"tier1-.*-(availability|latency)"}'
              legendFormat: "{{sloth_slo}}"
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: "$A"
              reducer:
                type: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              expression: "$B < 0.999"
        noDataState: OK
        execErrState: Error

      - uid: slo-tier2-breach
        title: "[Tier2] SLO Breach"
        condition: C
        for: 2m
        labels:
          severity: warning
          tier: standard
        annotations:
          summary: "Tier2 SLO Compliance breach (target: 99.5%)"
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: PBFA97CFB590B2093
              editorMode: code
              expr: '1 - slo:sli_error:ratio_rate5m{sloth_slo=~"tier2-.*-(availability|latency)"}'
              legendFormat: "{{sloth_slo}}"
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: "$A"
              reducer:
                type: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              expression: "$B < 0.995"
        noDataState: OK
        execErrState: Error

      - uid: slo-tier3-breach
        title: "[Tier3] SLO Breach"
        condition: C
        for: 2m
        labels:
          severity: info
          tier: background
        annotations:
          summary: "Tier3 SLO Compliance breach (target: 99.0%)"
        data:
          - refId: A
            datasourceUid: PBFA97CFB590B2093
            relativeTimeRange:
              from: 300
              to: 0
            model:
              datasource:
                type: prometheus
                uid: PBFA97CFB590B2093
              editorMode: code
              expr: '1 - slo:sli_error:ratio_rate5m{sloth_slo=~"tier3-.*-(availability|latency)"}'
              legendFormat: "{{sloth_slo}}"
              intervalMs: 30000
              maxDataPoints: 43200
          - refId: B
            datasourceUid: __expr__
            model:
              type: reduce
              expression: "$A"
              reducer:
                type: last
              settings:
                mode: dropNN
          - refId: C
            datasourceUid: __expr__
            model:
              type: math
              expression: "$B < 0.99"
        noDataState: OK
        execErrState: Error
