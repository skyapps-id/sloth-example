http:
  services:
    login-svc:
      loadBalancer:
        servers:
          - url: "http://app:5000"
    payment-svc:
      loadBalancer:
        servers:
          - url: "http://app:5000"
    checkout-svc:
      loadBalancer:
        servers:
          - url: "http://app:5000"
    auth-svc:
      loadBalancer:
        servers:
          - url: "http://app:5000"
    users-svc:
      loadBalancer:
        servers:
          - url: "http://app:5000"
    products-svc:
      loadBalancer:
        servers:
          - url: "http://app:5000"
    orders-svc:
      loadBalancer:
        servers:
          - url: "http://app:5000"
    cart-svc:
      loadBalancer:
        servers:
          - url: "http://app:5000"
    reports-svc:
      loadBalancer:
        servers:
          - url: "http://app:5000"
    analytics-svc:
      loadBalancer:
        servers:
          - url: "http://app:5000"
    notifications-svc:
      loadBalancer:
        servers:
          - url: "http://app:5000"
    exports-svc:
      loadBalancer:
        servers:
          - url: "http://app:5000"

  routers:
    login:
      rule: "Path(`/login`)"
      service: login-svc
      entryPoints:
        - web

    payment:
      rule: "Path(`/api/payment`)"
      service: payment-svc
      entryPoints:
        - web

    checkout:
      rule: "Path(`/api/checkout`)"
      service: checkout-svc
      entryPoints:
        - web

    auth:
      rule: "PathPrefix(`/api/auth`)"
      service: auth-svc
      entryPoints:
        - web

    users:
      rule: "Path(`/api/users`)"
      service: users-svc
      entryPoints:
        - web

    products:
      rule: "Path(`/api/products`)"
      service: products-svc
      entryPoints:
        - web

    orders:
      rule: "Path(`/api/orders`)"
      service: orders-svc
      entryPoints:
        - web

    cart:
      rule: "Path(`/api/cart`)"
      service: cart-svc
      entryPoints:
        - web

    reports:
      rule: "Path(`/api/reports`)"
      service: reports-svc
      entryPoints:
        - web

    analytics:
      rule: "Path(`/api/analytics`)"
      service: analytics-svc
      entryPoints:
        - web

    notifications:
      rule: "Path(`/api/notifications`)"
      service: notifications-svc
      entryPoints:
        - web

    exports:
      rule: "Path(`/api/exports`)"
      service: exports-svc
      entryPoints:
        - web

    health:
      rule: "Path(`/health`)"
      service: users-svc
      entryPoints:
        - web

    # Test endpoints - trigger intentional errors/latency for SLO testing
    error-tier1:
      rule: "Path(`/error/tier1`)"
      service: login-svc
      entryPoints:
        - web

    error-tier2:
      rule: "Path(`/error/tier2`)"
      service: users-svc
      entryPoints:
        - web

    error-tier3:
      rule: "Path(`/error/tier3`)"
      service: reports-svc
      entryPoints:
        - web

    latency-tier1:
      rule: "Path(`/latency/tier1`)"
      service: login-svc
      entryPoints:
        - web
