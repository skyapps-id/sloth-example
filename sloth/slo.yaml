version: prometheus/v1
service: sloth-example
slos:
  # === TIER 1 - CRITICAL: Per-Endpoint SLOs ===

  - name: "tier1-login-availability"
    objective: 99.9
    description: "/login availability"
    labels:
      tier: critical
      endpoint: login
    sli:
      events:
        error_query: |
          sum(rate(traefik_service_requests_total{service="login-svc@file",code=~"5.."}[{{.window}}]))
        total_query: |
          sum(rate(traefik_service_requests_total{service="login-svc@file"}[{{.window}}]))
    alerting:
      name: LoginHighErrorRate
      labels:
        severity: critical
        tier: critical

  - name: "tier1-login-latency"
    objective: 99.9
    description: "/login latency p99 < 500ms"
    labels:
      tier: critical
      endpoint: login
    sli:
      raw:
        error_ratio_query: |
          1 - (
            sum(rate(traefik_service_request_duration_seconds_bucket{service="login-svc@file",le="0.5"}[{{.window}}]))
            /
            sum(rate(traefik_service_request_duration_seconds_count{service="login-svc@file"}[{{.window}}]))
          )
    alerting:
      name: LoginHighLatency
      labels:
        severity: critical
        tier: critical

