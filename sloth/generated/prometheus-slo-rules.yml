- name: sloth-slo-alerts-sloth-example-tier3-latency
  rules:
  - alert: Tier3HighLatency
    expr: |
      (
          max(slo:sli_error:ratio_rate5m{sloth_id="sloth-example-tier3-latency", sloth_service="sloth-example", sloth_slo="tier3-latency"} > (14.4 * 0.01)) without (sloth_window)
          and
          max(slo:sli_error:ratio_rate1h{sloth_id="sloth-example-tier3-latency", sloth_service="sloth-example", sloth_slo="tier3-latency"} > (14.4 * 0.01)) without (sloth_window)
      )
      or
      (
          max(slo:sli_error:ratio_rate30m{sloth_id="sloth-example-tier3-latency", sloth_service="sloth-example", sloth_slo="tier3-latency"} > (6 * 0.01)) without (sloth_window)
          and
          max(slo:sli_error:ratio_rate6h{sloth_id="sloth-example-tier3-latency", sloth_service="sloth-example", sloth_slo="tier3-latency"} > (6 * 0.01)) without (sloth_window)
      )
    labels:
      severity: info
      sloth_severity: page
      tier: background
    annotations:
      summary: Background endpoints latency exceeded 5s threshold
      title: (page) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget
        burn rate is too fast.
  - alert: Tier3HighLatency
    expr: |
      (
          max(slo:sli_error:ratio_rate2h{sloth_id="sloth-example-tier3-latency", sloth_service="sloth-example", sloth_slo="tier3-latency"} > (3 * 0.01)) without (sloth_window)
          and
          max(slo:sli_error:ratio_rate1d{sloth_id="sloth-example-tier3-latency", sloth_service="sloth-example", sloth_slo="tier3-latency"} > (3 * 0.01)) without (sloth_window)
      )
      or
      (
          max(slo:sli_error:ratio_rate6h{sloth_id="sloth-example-tier3-latency", sloth_service="sloth-example", sloth_slo="tier3-latency"} > (1 * 0.01)) without (sloth_window)
          and
          max(slo:sli_error:ratio_rate3d{sloth_id="sloth-example-tier3-latency", sloth_service="sloth-example", sloth_slo="tier3-latency"} > (1 * 0.01)) without (sloth_window)
      )
    labels:
      severity: info
      sloth_severity: ticket
      tier: background
    annotations:
      summary: Background endpoints latency exceeded 5s threshold
      title: (ticket) {{$labels.sloth_service}} {{$labels.sloth_slo}} SLO error budget
        burn rate is too fast.
